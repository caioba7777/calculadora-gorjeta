{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow">
            <div class="card-body">
                <h1 class="text-center mb-4">Calculadora de Gorjeta</h1>

                <form method="POST">
                    <div class="mb-3">
                        <label for="conta" class="form-label">Valor total da conta</label>
                        <input
                            type="number"
                            step="0.01"
                            class="form-control"
                            id="conta"
                            name="conta"
                            placeholder="Ex: 100.00"
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label for="pessoas" class="form-label">Quantidade de pessoas</label>
                        <input
                            type="number"
                            class="form-control"
                            id="pessoas"
                            name="pessoas"
                            placeholder="Ex: 2"
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label for="gorjeta" class="form-label">Percentual de gorjeta (%)</label>
                        <input
                            type="number"
                            step="0.01"
                            class="form-control"
                            id="gorjeta"
                            name="gorjeta"
                            placeholder="Ex: 10"
                            required
                        >
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary w-100">Calcular</button>
                        <button type="reset" class="btn btn-secondary w-100">Limpar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
